<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)"/>
  
  <!-- Document/Paper -->
  <rect x="50" y="40" width="100" height="120" rx="8" fill="white" opacity="0.95"/>
  
  <!-- Image Icon - Sun -->
  <circle cx="84" cy="70" r="8" fill="#6366f1" opacity="0.6"/>
  
  <!-- Image Icon - Mountains -->
  <path d="M50 120 L70 90 L90 110 L110 80 L150 120 Z" fill="#6366f1" opacity="0.6"/>
  
  <!-- Extracted Text Lines -->
  <line x1="60" y1="136" x2="100" y2="136" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="148" x2="130" y2="148" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Scanning Effect Line -->
  <line x1="40" y1="100" x2="160" y2="100" stroke="white" stroke-width="2" opacity="0.5"/>
</svg>
